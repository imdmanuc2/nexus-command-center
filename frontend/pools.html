<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nexus Pools</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>Nexus Pools</h1>
        <p>Manage solo and public mining pools discovered across your fleet.</p>
      </div>
      <div id="poolStatus" class="status healthy">Loading</div>
    </header>

    <nav id="topNav" class="nav"></nav>

    <section class="assets-toolbar">
      <div class="asset-search-wrap">
        <label for="poolSearch">Search Pools</label>
        <input id="poolSearch" class="asset-search" placeholder="Search coin, host, mode, wallet, port..." autocomplete="off">
      </div>

      <div class="asset-filter-pills">
        <button class="asset-filter active" data-filter="all">All</button>
        <button class="asset-filter" data-filter="solo">Solo</button>
        <button class="asset-filter" data-filter="public">Public</button>
        <button class="asset-filter" data-filter="private">Private</button>
        <button class="asset-filter" data-filter="online">Online</button>
      </div>
    </section>

    <section id="poolSummary" class="asset-summary-grid"></section>

    <section id="poolList" class="pool-page-grid">
      Loading pools...
    </section>
  </main>

  <aside id="drawer" class="drawer">
    <button id="drawerClose" class="drawer-close">×</button>
    <div id="drawerContent"></div>
  </aside>
  <div id="drawerBackdrop" class="drawer-backdrop"></div>

  <script src="/js/nav.js"></script>
  <script src="/js/pools.js"></script>
  <script>renderNav("Pools");</script>
<script src="/js/mission.js"></script>
</body>
</html>
