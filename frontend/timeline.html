<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nexus Timeline</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="wrap">
  <div class="nexus-page-shell">
    <header>
      <div>
        <h1>Mission Timeline</h1>
        <p>Operational history across miners, pools, nodes, alerts, and infrastructure.</p>
      </div>
      <div class="status healthy">Live</div>
    </header>

    <nav id="topNav" class="nav"></nav>

    <section class="explorer-controls">
      <button class="timeline-filter active" data-filter="all">All</button>
      <button class="timeline-filter" data-filter="warning">Warnings</button>
      <button class="timeline-filter" data-filter="success">Success</button>
      <button class="timeline-filter" data-filter="info">Info</button>
      <button id="refreshTimeline" class="btn">Refresh</button>
    </section>

    <section class="timeline-panel">
      <h2>Live Operational Timeline</h2>
      <div id="timelineList">Loading timeline...</div>
    </section>
  </div>
</main>

<script src="/js/nav.js"></script>
<script src="/js/mission.js"></script>
<script src="/js/timeline.js"></script>
<script>
renderNav("Timeline");
</script>
</body>
</html>
