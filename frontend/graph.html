<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Nexus Infrastructure Explorer</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<main class="wrap">

<header>
<div>
<h1>Infrastructure Explorer</h1>
<p>Live digital twin of pools, hosts, workers, and assets</p>
</div>

<div id="graphHealth" class="status healthy">
Loading...
</div>

</header>

<nav id="topNav" class="nav"></nav>

<section class="explorer-controls">
  <button id="rebuildGraph" class="btn">Rebuild Graph</button>
  <button id="clearGraphSelection" class="btn">Clear Highlight</button>
  <button id="showAllNodes" class="btn">Show All</button>
  <button id="saveGraphLayout" class="btn">Save Layout</button>
  <button id="resetGraphLayout" class="btn">Reset Layout</button>
  <label class="auto-refresh-toggle">
    <input id="autoRefreshGraph" type="checkbox" checked>
    Auto refresh
  </label>
</section>

<section id="nodeTypeFilters" class="explorer-type-filters">
  <button class="type-filter active" data-type="all">All</button>
  <button class="type-filter" data-type="host">Hosts</button>
  <button class="type-filter" data-type="pool">Pools</button>
  <button class="type-filter" data-type="worker">Workers</button>
  <button class="type-filter" data-type="asic">ASICs</button>
</section>

<section class="asset-summary-grid" id="graphSummary"></section>

<section class="infra-canvas-panel">
<h2>Live Infrastructure Canvas</h2>
<div id="graphCanvas" class="infra-canvas">Loading digital twin...</div>
</section>

<section class="graph-layout">

<div class="graph-list-panel">

<h2>Nodes</h2>

<input
id="graphSearch"
class="asset-search"
placeholder="Search graph..."
autocomplete="off">

<div id="graphNodes"></div>

</div>

<div class="graph-detail-panel">

<h2>Relationships</h2>

<div id="graphRelationships">

Select a node.

</div>

</div>

</section>

</main>

<script src="/js/nav.js"></script>
<script src="/js/graph.js"></script>

<script>
renderNav("Infrastructure Explorer");
</script>

</body>
</html>
