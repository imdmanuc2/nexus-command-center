<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nexus Infrastructure Map</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>Nexus Infrastructure Map</h1>
        <p>Live Server → Solo/Public Pools → Miners</p>
      </div>
      <div id="mapStatus" class="status healthy">Live</div>
    </header>

    <nav id="topNav" class="nav"></nav>

    <section class="infra-toolbar">
      <div>
        <strong>Production Infrastructure View</strong>
        <span id="infraSubtitle">Loading live MiningCore data...</span>
      </div>
      <button id="refreshMap" class="btn">Refresh Map</button>
    </section>

    <section id="infraMap" class="infra-map">
      Loading infrastructure...
    </section>
  </main>

  <aside id="drawer" class="drawer">
    <button id="drawerClose" class="drawer-close">×</button>
    <div id="drawerContent"></div>
  </aside>
  <div id="drawerBackdrop" class="drawer-backdrop"></div>

  <script src="/js/nav.js"></script>
  <script src="/js/map.js"></script>
  <script>renderNav("Infrastructure");</script>
<script src="/js/mission.js"></script>
</body>
</html>
