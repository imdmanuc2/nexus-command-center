<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nexus Operations Center</title><link rel="stylesheet" href="/css/operations-center.css"></head>
<body><div id="nexusNav"></div><main class="ops-shell">
<header class="ops-header"><div><p class="eyebrow">Nexus Command Center</p><h1>Operations Center</h1><p>Execution, verification, rollback, recovery, and operational evidence.</p></div><div class="header-actions"><span id="workerState" class="pill">Worker status unknown</span><button id="refreshButton">Refresh</button></div></header>
<section class="metrics"><article><span>Recent</span><strong id="metricRecent">0</strong></article><article><span>Failed</span><strong id="metricFailed">0</strong></article><article><span>Pending</span><strong id="metricPending">0</strong></article><article><span>Rollbacks</span><strong id="metricRollbacks">0</strong></article></section>
<section class="toolbar"><input id="searchInput" type="search" placeholder="Search operations"><select id="statusFilter"><option value="">All statuses</option><option>failed</option><option>error</option><option>warning</option><option>running</option><option>pending</option><option>passed</option><option>completed</option><option>succeeded</option><option>rolled-back</option></select><select id="typeFilter"><option value="">All types</option><option>execution</option><option>verification</option><option>rollback</option></select><input id="assetFilter" placeholder="Asset ID"></section>
<section class="panel"><div class="panel-heading"><div><h2>Evidence Timeline</h2><p id="resultSummary">Loading…</p></div></div><div id="opsTimeline" class="timeline"></div><div id="emptyState" class="empty" hidden>No evidence matches the filters.</div></section>
<aside id="opsDrawer" class="drawer" aria-hidden="true"><div class="drawer-head"><h2 id="drawerTitle">Evidence detail</h2><button id="drawerClose">×</button></div><div id="drawerBody"></div></aside>
</main><script src="/js/nav.js"></script><script src="/js/evidence-client.js"></script><script src="/js/operations-center.js"></script></body></html>
