<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nexus Command Center</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>Nexus Command Center</h1>
        <p>The operating console for mining.</p>
      </div>
      <div id="status" class="status">Loading...</div>
    </header>

    <section class="grid">
      <div class="card"><span>Systems</span><strong id="systems">—</strong></div>
      <div class="card"><span>Blockchain Nodes</span><strong id="nodes">—</strong></div>
      <div class="card"><span>Mining Backends</span><strong id="backends">—</strong></div>
      <div class="card"><span>Dashboards</span><strong id="dashboards">—</strong></div>
      <div class="card"><span>Stratum</span><strong id="stratum">—</strong></div>
      <div class="card"><span>RPC Endpoints</span><strong id="rpc">—</strong></div>
      <div class="card"><span>Alerts</span><strong id="alerts">—</strong></div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
