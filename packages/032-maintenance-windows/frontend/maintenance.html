<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nexus Maintenance Windows</title><link rel="stylesheet" href="/css/maintenance.css"></head>
<body><main><header><div><p class="eyebrow">NEXUS OPERATIONS</p><h1>Maintenance Windows</h1><p>Schedule planned work across assets, racks, sites, pools, clusters, and tags.</p></div><button id="refresh">Refresh</button></header>
<section class="panel"><h2>Schedule maintenance</h2><form id="form"><input name="name" placeholder="Window name" required><input name="reason" placeholder="Reason"><label>Starts <input name="startsAt" type="datetime-local" required></label><label>Ends <input name="endsAt" type="datetime-local" required></label><select name="targetType"><option value="asset">Asset</option><option value="asset_type">Asset type</option><option value="site">Site</option><option value="rack">Rack</option><option value="pool">Pool</option><option value="cluster">Cluster</option><option value="tag">Tag</option></select><input name="targetValue" placeholder="Target value" required><button type="submit">Schedule</button></form></section>
<section class="panel"><div class="section-head"><h2>Windows</h2><span id="count"></span></div><div id="windows"></div></section></main><script src="/js/maintenance.js"></script></body></html>
